        const SidebarItem = ({ tool, isActive, onClick }) => {

        const NotepadView = () => {
            const editorRef = React.useRef(null);
            const fileInputRef = React.useRef(null);

            const [currentUser, setCurrentUser] = useState('Liezel');

            const [logs, setLogs] = useState(() => {
                const saved = localStorage.getItem('vgc_logs_Luis');
                return saved ? JSON.parse(saved) : [];
            });

            // Update logs when user changes
            useEffect(() => {
                const saved = localStorage.getItem(`vgc_logs_${currentUser}`);
                setLogs(saved ? JSON.parse(saved) : []);
            }, [currentUser]);
            const [filterMode, setFilterMode] = useState('all');
            // Changed: menuState tracks ID and Position
            const [menuState, setMenuState] = useState({ id: null, position: 'bottom' });
            const [editingId, setEditingId] = useState(null);

            const getDay = (ts) => new Date(ts).toLocaleDateString(undefined, { day: 'numeric', month: 'long', year: 'numeric' });
            const getTime = (ts) => new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            const handleImageClick = () => fileInputRef.current?.click();
            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = () => {
                    const quill = editorRef.current;
                    const range = quill.getSelection() || { index: quill.getLength() };

                    if (file.type.startsWith('image/')) {
                        // Handle Image
                        quill.insertEmbed(range.index, 'image', reader.result);
                    } else {
                        // Handle Documents (PDF, Word, Excel)
                        let icon = '📄'; // Default
                        if (file.type.includes('pdf')) icon = '📕';
                        if (file.type.includes('word') || file.name.endsWith('.doc') || file.name.endsWith('.docx')) icon = '📝';
                        if (file.type.includes('excel') || file.type.includes('spreadsheet') || file.name.endsWith('.xls') || file.name.endsWith('.xlsx')) icon = '📊';

                        // Create File Card (HTML Link)
                        // We use a button-like aesthetic with base64 href for download
                        const cardHtml = `
                            <br/>
                            <a href="${reader.result}" download="${file.name}" 
                               class="inline-flex items-center gap-2 px-3 py-2 bg-dark-700 hover:bg-dark-600 border border-dark-600 rounded-lg text-sm text-gray-200 hover:text-white transition-colors no-underline my-2 select-none"
                               contenteditable="false">
                               <span class="text-lg">${icon}</span>
                               <span class="font-medium">${file.name}</span>
                            </a>
                            <br/>
                        `;

                        quill.clipboard.dangerouslyPasteHTML(range.index, cardHtml);
                    }
                };
                reader.readAsDataURL(file);
                e.target.value = '';
            };

            const handleSend = () => {
                if (!editorRef.current) return;
                const quill = editorRef.current;
                const content = quill.root.innerHTML;
                const text = quill.getText().trim();
                const hasMedia = content.includes('<img') || content.includes('<a '); // Allow if it has images OR links

                if (!text && !hasMedia) return;

                if (editingId) {
                    setLogs(prev => prev.map(log => log.id === editingId ? { ...log, content: content } : log));
                    setEditingId(null);
                } else {
                    const newLog = {
                        id: Date.now(),
                        timestamp: new Date().toLocaleString(),
                        content: content,
                        starred: false
                    };
                    setLogs(prev => [newLog, ...prev]);
                }
                quill.root.innerHTML = '';
            };

            const toggleStar = (id) => {
                setLogs(prev => prev.map(log => log.id === id ? { ...log, starred: !log.starred } : log));
                setMenuState({ id: null, position: 'bottom' });
            };
            const handleDelete = (id) => {
                setLogs(prev => prev.filter(l => l.id !== id));
                setMenuState({ id: null, position: 'bottom' });
            };
            const handleEdit = (log) => {
                setEditingId(log.id);
                setMenuState({ id: null, position: 'bottom' });
                if (editorRef.current) {
                    editorRef.current.root.innerHTML = log.content;
                    editorRef.current.focus();
                }
            };

            // Smart Toggle Logic
            const handleMenuToggle = (e, id) => {
                e.stopPropagation();
                if (menuState.id === id) {
                    setMenuState({ id: null, position: 'bottom' });
                } else {
                    const rect = e.currentTarget.getBoundingClientRect();
                    const spaceBelow = window.innerHeight - rect.bottom;
                    // Heuristic: If < 250px space below, open upwards
                    const position = spaceBelow < 250 ? 'top' : 'bottom';
                    setMenuState({ id, position });
                }
            };

            // Close menu on click outside
            useEffect(() => {
                const closeMenu = () => setMenuState({ id: null, position: 'bottom' });
                window.addEventListener('click', closeMenu);
                return () => window.removeEventListener('click', closeMenu);
            }, []);

            useEffect(() => {
                // Init Quill
                if (editorRef.current) return;
                const quill = new Quill('#editor', {
                    theme: 'snow',
                    modules: {
                        toolbar: [['bold', 'italic', 'underline'], ['link', 'image']],
                        keyboard: {
                            bindings: {
                                enter: { key: 13, handler: () => { document.getElementById('send-btn').click(); return false; } }
                            }
                        }
                    },
                    placeholder: 'Escribe una nueva entrada...'
                });
                editorRef.current = quill;
            }, []);

            useEffect(() => { localStorage.setItem(`vgc_logs_${currentUser}`, JSON.stringify(logs)); }, [logs, currentUser]);



            const handleLogClick = async (e) => {
                const link = e.target.closest('a');

                // Intercept only if it's a download link (Data URI or Blob)
                if (link && link.hasAttribute('download')) {
                    e.preventDefault();

                    // 1. Remove target if present to prevent new tabs
                    link.removeAttribute('target');

                    const downloadUrl = link.href;
                    const downloadName = link.getAttribute('download');

                    try {
                        // 2. Fetch Blob from Data URI
                        const response = await fetch(downloadUrl);
                        const blob = await response.blob();

                        // 3. Create Object URL
                        const blobUrl = URL.createObjectURL(blob);

                        // 4. Force Download via invisible link
                        const tempLink = document.createElement('a');
                        tempLink.href = blobUrl;
                        tempLink.download = downloadName;
                        tempLink.style.display = 'none';
                        document.body.appendChild(tempLink);

                        tempLink.click();

                        // 5. Cleanup
                        document.body.removeChild(tempLink);
                        URL.revokeObjectURL(blobUrl);

                    } catch (err) {
                        console.error("Error al descargar:", err);
                        alert("Error al descargar el archivo. Intenta subirlo de nuevo.");
                    }
                }
            };

            const filteredLogs = filterMode === 'starred' ? logs.filter(l => l.starred) : logs;

            return (
                <div className="flex-1 flex flex-col h-screen bg-dark-900 overflow-hidden relative">
                    <style>{`
                        .ql-toolbar.ql-snow { border: none !important; border-top: 1px solid #374151 !important; background: #1f2937; padding: 8px !important; }
                        .ql-container.ql-snow { border: none !important; background: #111827; }
                        .ql-editor { 
                            color: #d1d5db; 
                            font-size: 0.95rem; 
                            padding: 1rem !important; 
                            min-height: 80px; 
                            /* Fix infinite horizontal growth */
                            max-width: 100%;
                            white-space: pre-wrap;
                            word-break: break-all;
                            overflow-wrap: anywhere;
                            /* Vertical scrolling constraint */
                            max-height: 150px;
                            overflow-y: auto;
                        }
                        /* Select Options High Contrast Fix */
                        select option {
                            background-color: #1f2937;
                            color: white;
                        }
                        .ql-editor.ql-blank::before { color: #6b7280 !important; font-style: italic !important; }
                        .log-content h1, .log-content h2 { font-weight: bold; margin-bottom: 0.5rem; }
                        .log-content p { margin-bottom: 0.5rem; }
                        .log-content img { max-width: 100%; border-radius: 8px; margin-top: 0.5rem; border: 1px solid #374151; }
                        .log-content a { color: #3b82f6; text-decoration: underline; }
                        .log-content ul, .log-content ol { padding-left: 1.5rem; margin-bottom: 0.5rem; }
                        .log-content li { list-style-type: disc; }
                    `}</style>

                    <div className="flex items-center justify-between px-6 py-4 bg-dark-800 border-b border-dark-700 shadow-md">
                        <div className="flex items-center gap-3">
                            <Icon name="Book" size={20} className="text-brand-500" />
                            <h2 className="text-xl font-black text-white">NOTEPAD</h2>
                        </div>
                        <div className="flex items-center gap-2 bg-dark-900/50 p-1 rounded-lg border border-dark-600/50">
                            {/* User Selector */}
                            <select value={currentUser} onChange={(e) => setCurrentUser(e.target.value)} className="bg-transparent text-xs text-brand-400 font-bold focus:outline-none p-1 mr-2 border-r border-dark-600/50">
                                <option value="Luis">LUIS</option>
                                <option value="Liezel">LIEZEL</option>
                            </select>

                            <select value={filterMode} onChange={(e) => setFilterMode(e.target.value)} className="bg-transparent text-xs text-gray-300 focus:outline-none p-1">
                                <option value="all">TODOS</option>
                                <option value="starred">DESTACADOS</option>
                            </select>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-6 pb-64 space-y-6 bg-[#0d1117] flex flex-col-reverse">
                        {filteredLogs.map((log, index) => {
                            const isLast = index === filteredLogs.length - 1;
                            const nextLog = filteredLogs[index + 1];
                            const showSeparator = isLast || getDay(log.id) !== getDay(nextLog?.id || 0);

                            return (
                                <React.Fragment key={log.id}>
                                    <div className={`flex flex-col animate-in fade-in slide-in-from-bottom-2 duration-300 ${editingId === log.id ? 'opacity-50 pointer-events-none' : ''}`}>
                                        <div className="self-start max-w-4xl w-full relative group">
                                            {/* Metadata */}
                                            <div className="flex items-center gap-2 mb-1 ml-1">
                                                <span className="text-[10px] font-bold text-gray-500 opacity-70">{getTime(log.id)}</span>
                                                {log.starred && <Icon name="Star" size={12} className="text-yellow-400 fill-yellow-400" />}
                                            </div>

                                            {/* --- CONTEXT MENU BUTTON (UNICODE) --- */}
                                            <button
                                                onClick={(e) => handleMenuToggle(e, log.id)}
                                                className="absolute top-2 right-2 z-20 w-8 h-8 flex items-center justify-center rounded-full text-zinc-500 hover:text-white hover:bg-dark-700 transition-colors text-2xl font-bold leading-none select-none cursor-pointer pb-2"
                                                style={{ position: 'absolute', top: '5px', right: '5px' }}
                                                title="Opciones"
                                            >
                                                &#8230; {/* Unicode Horizontal Ellipsis */}
                                            </button>

                                            {/* DROPDOWN MENU */}
                                            {menuState.id === log.id && (
                                                <div className="absolute right-2 z-50 w-40 bg-[#161b22] border border-gray-600 rounded shadow-2xl overflow-hidden"
                                                    style={{
                                                        zIndex: 9999,
                                                        boxShadow: '0 4px 20px rgba(0,0,0,0.5)',
                                                        // Smart Position Styles
                                                        top: menuState.position === 'bottom' ? 'auto' : 'auto',
                                                        bottom: menuState.position === 'top' ? '100%' : 'auto',
                                                        marginTop: menuState.position === 'bottom' ? '2.5rem' : '0',
                                                        marginBottom: menuState.position === 'top' ? '-5px' : '0'
                                                    }}>
                                                    <button onClick={() => handleEdit(log)} className="w-full text-left px-4 py-3 text-sm text-gray-200 hover:bg-blue-600 hover:text-white border-b border-gray-700">✏️ Modificar</button>
                                                    <button onClick={() => toggleStar(log.id)} className="w-full text-left px-4 py-3 text-sm text-gray-200 hover:bg-yellow-600 hover:text-white border-b border-gray-700">🌟 {log.starred ? "No Destacar" : "Destacar"}</button>
                                                    <button onClick={() => handleDelete(log.id)} className="w-full text-left px-4 py-3 text-sm text-red-400 hover:bg-red-600 hover:text-white">🗑️ Eliminar</button>
                                                </div>
                                            )}

                                            {/* Content Bubble */}
                                            <div onClick={handleLogClick} className={`log-content bg-dark-800 border ${log.starred ? 'border-yellow-500/30' : 'border-dark-700'} rounded-2xl p-4 text-gray-200 shadow-sm`}
                                                dangerouslySetInnerHTML={{ __html: log.content }} />
                                        </div>
                                    </div>
                                    {showSeparator && (
                                        <div className="flex items-center gap-4 my-8 opacity-60">
                                            <div className="h-px flex-1 bg-dark-600"></div>
                                            <div className="text-xs font-bold text-gray-500 uppercase tracking-widest px-2">{getDay(log.id)}</div>
                                            <div className="h-px flex-1 bg-dark-600"></div>
                                        </div>
                                    )}
                                </React.Fragment>
                            );
                        })}
                    </div>

                    {/* Composer */}
                    <div className={`bg-dark-800 p-4 border-t border-dark-700 z-20 ${editingId && 'border-blue-500'}`}>
                        {editingId && <div className="text-xs text-blue-500 font-bold mb-2 uppercase">Editando mensaje...</div>}
                        <div className="max-w-5xl mx-auto flex gap-4 items-end">
                            <input type="file" ref={fileInputRef} className="hidden" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx" onChange={handleImageChange} />
                            <button onClick={handleImageClick} className="h-10 w-10 rounded-full bg-dark-700 text-gray-400 hover:text-white flex items-center justify-center"><Icon name="Paperclip" size={18} /></button>
                            <div className="flex-1 bg-gray-900 rounded border border-dark-600 h-24 flex flex-col"><div id="editor" className="flex-1"></div></div>
                            <button id="send-btn" onClick={handleSend} className={`h-10 w-10 rounded-full text-white flex items-center justify-center ${editingId ? 'bg-blue-600' : 'bg-brand-600'}`}><Icon name={editingId ? "Check" : "Send"} size={18} /></button>
                        </div>
                    </div>
                </div>
            );
        };

        const NaturesView = () => (
            <div className="flex-1 bg-dark-900 p-8 text-white overflow-y-auto">
                <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><Icon name="Leaf" className="text-green-500" /> Natures Chart</h2>
                <table className="w-full text-left bg-dark-800 rounded-lg overflow-hidden">
                    <thead className="bg-dark-700 text-xs uppercase"><tr><th className="p-3">Nature</th><th className="p-3">ES</th><th className="p-3 text-green-400">+</th><th className="p-3 text-red-400">-</th></tr></thead>
                    <tbody>{NATURES.map((n, i) => <tr key={i} className="border-b border-dark-700 last:border-0 hover:bg-dark-700/50"><td className="p-3">{n.name}</td><td className="p-3 italic text-gray-400">{n.es}</td><td className="p-3 text-green-400">{n.plus}</td><td className="p-3 text-red-400">{n.minus}</td></tr>)}</tbody>
                </table>
            </div>
        );

        const TypeChartView = () => (
            <div className="flex-1 bg-dark-900 flex flex-col h-screen overflow-hidden">
                <div className="p-4 border-b border-dark-700"><h2 className="text-lg font-bold text-white flex items-center gap-2"><Icon name="Zap" className="text-yellow-500" /> Tabla de Tipos</h2></div>
                <div className="flex-1 flex items-center justify-center bg-[#0d1117] overflow-auto p-4">
                    <div className="inline-block border border-dark-700 shadow-2xl rounded overflow-hidden">
                        <div className="flex"><div className="w-16 h-6 bg-dark-800 border-r border-b border-black"></div>{TYPES_DATA.map(t => <div key={t.name} style={{ background: t.color }} className="w-6 h-6 flex items-center justify-center border-r border-b border-black text-[8px] font-black text-white">{t.abbr}</div>)}</div>
                        {TYPE_MATRIX.map((row, r) => (
                            <div key={r} className="flex h-6">
                                <div style={{ background: TYPES_DATA[r].color }} className="w-16 flex items-center justify-end pr-1 text-[8px] font-black text-white border-b border-black">{TYPES_DATA[r].name}</div>
                                {row.map((c, ci) => {
                                    let bg = c === 1 ? 'bg-[#FF5252]' : c === 2 ? 'bg-[#FAF089]' : c === 3 ? 'bg-[#F5F5F5]' : 'bg-[#F5F5F5]';
                                    let txt = c === 1 ? '2' : c === 2 ? '½' : c === 3 ? '0' : '';
                                    let clr = c === 1 ? 'text-white' : c === 2 ? 'text-black' : c === 3 ? 'text-blue-600' : 'text-transparent';
                                    return <div key={ci} className={`w-6 flex items-center justify-center border-r border-b border-black text-[9px] font-bold ${bg} ${clr}`}>{txt}</div>
                                })}
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        const ExternalView = ({ tool }) => (
            <div className="flex-1 bg-dark-900 flex flex-col items-center justify-center text-center p-10">
                <div className="w-32 h-32 rounded-2xl bg-dark-800 flex items-center justify-center mb-6 shadow-xl"><Icon name={tool.icon} size={64} className="text-brand-500" /></div>
                <h2 className="text-3xl font-black text-white mb-2">{tool.name}</h2>
                <a href={tool.url} target="_blank" className="px-8 py-4 bg-brand-600 hover:bg-brand-500 text-white rounded-lg font-bold shadow-lg flex items-center gap-2 transition-transform hover:translate-y-[-2px]">Launch <Icon name="ExternalLink" size={18} /></a>
            </div>
        );

        const IframeView = ({ tool }) => (
            <div className="flex-1 flex flex-col h-screen bg-gray-900 border-l border-dark-700">
                <header className="h-10 bg-dark-800 flex items-center justify-between px-4 border-b border-dark-700">
                    <span className="text-xs font-bold text-gray-400 flex items-center gap-2"><Icon name={tool.icon} size={14} /> {tool.name}</span>
                    <a href={tool.url} target="_blank" className="text-[10px] bg-dark-700 px-2 py-1 rounded text-gray-300 hover:text-white">Open External ↗</a>
                </header>
                <div className="flex-1 relative bg-white"><iframe src={tool.url} className="absolute inset-0 w-full h-full border-none" /></div>
            </div>
        );

        const TwitchView = () => (
            <div className="flex-1 bg-dark-900 flex flex-col items-center justify-center text-center p-10">
                <div className="w-32 h-32 rounded-2xl bg-[#6441a5] flex items-center justify-center mb-6 shadow-xl shadow-purple-900/50">
                    <Icon name="Twitch" size={64} className="text-white" />
                </div>
                <h2 className="text-3xl font-black text-white mb-2 tracking-tight">Canal Oficial: Berichandev</h2>
                <p className="text-gray-400 mb-8 max-w-md">Accede directamente al stream para ver combates y estrategias en tiempo real.</p>

                <a
                    href="https://www.twitch.tv/berichandev"
                    target="_blank"
                    rel="noopener noreferrer"
                    className="group relative px-8 py-4 bg-[#9146FF] hover:bg-[#A970FF] text-white rounded-xl font-bold text-lg shadow-lg hover:shadow-purple-900/50 transition-all hover:-translate-y-1 inline-flex items-center gap-3"
                >
                    <Icon name="ExternalLink" size={20} />
                    VER STREAM EN TWITCH
                </a>
            </div>
        );

        const WikiDexView = () => {
            const REGIONS = [
                { id: 'nacional', name: 'Nacional', full: 'Nacional (Completa)', url: 'https://www.wikidex.net/wiki/Lista_de_Pok%C3%A9mon' },
                { id: 'luminalia', name: 'Luminalia (ZA)', full: 'Especial: Ciudad Luminalia (ZA)', url: 'https://www.wikidex.net/wiki/Lista_de_Pok%C3%A9mon_seg%C3%BAn_la_Pok%C3%A9dex_de_Ciudad_Luminalia' },
                { id: 'paldea', name: 'Paldea', full: 'Gen 9: Paldea', url: 'https://www.wikidex.net/wiki/Lista_de_Pok%C3%A9mon_seg%C3%BAn_la_Pok%C3%A9dex_de_Paldea' },
                { id: 'hisui', name: 'Hisui', full: 'Gen 8: Hisui (Arceus)', url: 'https://www.wikidex.net/wiki/Lista_de_Pok%C3%A9mon_seg%C3%BAn_la_Pok%C3%A9dex_de_Hisui' },
                { id: 'galar', name: 'Galar', full: 'Gen 8: Galar', url: 'https://www.wikidex.net/wiki/Lista_de_Pok%C3%A9mon_seg%C3%BAn_la_Pok%C3%A9dex_de_Galar' },
                { id: 'alola', name: 'Alola', full: 'Gen 7: Alola', url: 'https://www.wikidex.net/wiki/Lista_de_Pok%C3%A9mon_de_la_s%C3%A9ptima_generaci%C3%B3n' },
                { id: 'kalos', name: 'Kalos', full: 'Gen 6: Kalos', url: 'https://www.wikidex.net/wiki/Lista_de_Pok%C3%A9mon_de_la_sexta_generaci%C3%B3n' },
                { id: 'teselia', name: 'Teselia', full: 'Gen 5: Teselia/Unova', url: 'https://www.wikidex.net/wiki/Lista_de_Pok%C3%A9mon_de_la_quinta_generaci%C3%B3n' },
                { id: 'sinnoh', name: 'Sinnoh', full: 'Gen 4: Sinnoh', url: 'https://www.wikidex.net/wiki/Lista_de_Pok%C3%A9mon_de_la_cuarta_generaci%C3%B3n' },
                { id: 'hoenn', name: 'Hoenn', full: 'Gen 3: Hoenn', url: 'https://www.wikidex.net/wiki/Lista_de_Pok%C3%A9mon_de_la_tercera_generaci%C3%B3n' },
                { id: 'johto', name: 'Johto', full: 'Gen 2: Johto', url: 'https://www.wikidex.net/wiki/Lista_de_Pok%C3%A9mon_de_la_segunda_generaci%C3%B3n' },
                { id: 'kanto', name: 'Kanto', full: 'Gen 1: Kanto', url: 'https://www.wikidex.net/wiki/Lista_de_Pok%C3%A9mon_de_la_primera_generaci%C3%B3n' },
            ];

            const [selectedId, setSelectedId] = useState('nacional');
            const currentRegion = REGIONS.find(r => r.id === selectedId) || REGIONS[0];

            return (
                <div className="flex-1 flex flex-col h-screen bg-dark-900 overflow-hidden">
                    {/* Header Bar */}
                    <div className="h-16 shrink-0 bg-dark-800 border-b border-dark-700 flex items-center justify-between px-6 shadow-md z-10 transition-colors">
                        <div className="flex items-center gap-3">
                            <Icon name="Book" size={24} className="text-brand-500" />
                            <h2 className="text-lg font-bold text-white hidden sm:block">WikiDex Launcher</h2>
                        </div>

                        <div className="flex-1 max-w-2xl mx-4 relative">
                            <select
                                onChange={(e) => setSelectedId(e.target.value)}
                                value={selectedId}
                                className="w-full bg-dark-900 border border-dark-600 text-white text-sm rounded-lg block p-2.5 pr-10 focus:ring-brand-500 focus:border-brand-500 appearance-none font-bold tracking-wide"
                            >
                                {REGIONS.map(region => (
                                    <option key={region.id} value={region.id}>{region.full}</option>
                                ))}
                            </select>
                            <div className="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">
                                <Icon name="ChevronDown" size={16} />
                            </div>
                        </div>
                    </div>

                    {/* Main Launcher Body */}
                    <div className="flex-1 flex flex-col items-center justify-center p-8 text-center bg-gradient-to-b from-dark-900 to-black">
                        <div className="w-32 h-32 bg-dark-800 rounded-3xl flex items-center justify-center mb-6 shadow-2xl border border-dark-700">
                            <Icon name="Book" size={64} className="text-brand-500" />
                        </div>

                        <h2 className="text-gray-400 font-bold uppercase tracking-widest text-sm mb-6">Base de Datos Seleccionada:</h2>

                        <a
                            href={currentRegion.url}
                            target="_blank"
                            rel="noopener noreferrer"
                            className="group relative w-full max-w-xl px-8 py-8 bg-brand-600 hover:bg-brand-500 text-white rounded-2xl font-black text-2xl shadow-xl hover:shadow-red-900/40 transition-all hover:-translate-y-1 flex flex-col items-center justify-center gap-2 border border-white/10"
                        >
                            <span className="flex items-center gap-3">
                                ABRIR POKÉDEX DE {currentRegion.name.toUpperCase()} <Icon name="ExternalLink" size={28} />
                            </span>
                            <span className="text-xs font-medium opacity-70 font-sans tracking-wide bg-black/20 px-3 py-1 rounded-full">
                                Click para abrir en nueva pestaña ↗
                            </span>
                        </a>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeToolId, setActiveToolId] = useState('notepad');
            const activeTool = TOOLS.find(t => t.id === activeToolId) || TOOLS[0];
            return (
                <div className="flex w-full h-screen bg-black font-sans text-white">
                    <Sidebar activeToolId={activeToolId} onSelectTool={setActiveToolId} />
                    {activeTool.type === 'notepad' ? <NotepadView /> :
                        activeTool.type === 'twitch' ? <TwitchView /> :
                            activeTool.type === 'wikidex' ? <WikiDexView /> :
                                activeTool.type === 'external' ? <ExternalView tool={activeTool} /> :
                                    activeTool.type === 'internal_nature' ? <NaturesView /> :
                                        activeTool.type === 'internal_type' ? <TypeChartView /> : <IframeView tool={activeTool} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
